name: Publish Registry Release

on:
  push:
    branches: [main, master]
    paths:
      - 'registry.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Validate before release
        run: go run ./cmd/validate --index registry.json

      - name: Publish registry.json release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r .version registry.json)
          TAG="registry-v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" registry.json --clobber
          else
            gh release create "$TAG" registry.json \
              --title "Registry v${VERSION}" \
              --notes "Updated smuler registry index."
          fi
          gh release upload "$TAG" registry.json --clobber || true
          LATEST_TAG="latest"
          if gh release view "$LATEST_TAG" >/dev/null 2>&1; then
            gh release upload "$LATEST_TAG" registry.json --clobber
          else
            gh release create "$LATEST_TAG" registry.json \
              --title "Latest registry" \
              --notes "Always points to the current registry index." \
              --latest
          fi
