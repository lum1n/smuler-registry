name: Validate Registry

on:
  pull_request:
    paths:
      - 'registry.json'
      - 'submissions/**'
      - 'schema/**'
      - 'cmd/validate/**'
  push:
    branches: [main, master]
    paths:
      - 'registry.json'
      - 'submissions/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Validate registry index
        run: go run ./cmd/validate --index registry.json

      - name: Validate submission files
        run: |
          if [ -d submissions ]; then
            find submissions -name '*.json' -print0 | while IFS= read -r -d '' f; do
              echo "Validating submission $f"
              go run ./cmd/validate --entry "$f"
            done
          fi
